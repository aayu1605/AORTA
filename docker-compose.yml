version: '3.9'
services:
  frontend:
    build: ./frontend/aorta-frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/aorta-frontend:/app
    working_dir: /app
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aorta
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      - db

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    environment:
      - PORT=9000
    ports:
      - "9000:9000"

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aorta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:






